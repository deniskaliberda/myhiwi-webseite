<svg viewBox="0 0 220 64" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="MyHiwi Logo">
  <defs>
    <linearGradient id="hGrad" x1="0.4" y1="0" x2="0.1" y2="1">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="40%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1e3a8a"/>
    </linearGradient>
    <linearGradient id="foldGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0f172a" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#0f172a" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <!-- H Icon Mark (64x64 optical square) -->
  <!-- Left pillar -->
  <rect x="4" y="4" width="16" height="56" rx="2" fill="url(#hGrad)"/>
  <!-- Right pillar -->
  <rect x="44" y="4" width="16" height="56" rx="2" fill="url(#hGrad)"/>
  <!-- Crossbar as parallelogram: diagonal chamfer creates 3D fold -->
  <polygon points="20,32 31,22 44,22 44,36 20,44" fill="url(#hGrad)"/>
  <!-- Shadow fold triangle for depth -->
  <polygon points="20,32 31,22 31,32" fill="url(#foldGrad)"/>

  <!-- Wordmark: MyHiwi -->
  <text x="76" y="41" font-family="'DM Sans', 'Inter', system-ui, sans-serif" font-weight="700" font-size="26" letter-spacing="-0.5" fill="#0f172a">My<tspan fill="#3b82f6">Hiwi</tspan></text>
  <!-- Tagline -->
  <text x="77" y="53" font-family="'DM Sans', 'Inter', system-ui, sans-serif" font-weight="400" font-size="9" letter-spacing="2" fill="#64748b" text-transform="uppercase">DEIN DIGITALER HIWI</text>
</svg>
